title: WikiMuki
description: >-
  Website Kuliah Gratis oleh Arrianto Mukti Wibowo, M.Sc., CISA.
  Materi kuliah Sistem Informasi, IT Governance, Business Process,
  Security, dan lainnya — gratis untuk seluruh anak bangsa.
author: Arrianto Mukti Wibowo

remote_theme: academicpages/academicpages.github.io

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Site URL — update to your actual GitHub Pages URL
# url: "https://vr1090.github.io"
# baseurl: "/wikimuki"

# Exclude non-site files
exclude:
  - .venv/
  - .gitignore
  - log.md
  - "wikimuki_files/"

# Collections for subfolders
collections:
  bp:
    output: true
    permalink: /bp/:name/
  itgov:
    output: true
    permalink: /itgov/:name/
  spis:
    output: true
    permalink: /spis/:name/
  security:
    output: true
    permalink: /security/:name/
  audit:
    output: true
    permalink: /audit/:name/
  miti:
    output: true
    permalink: /miti/:name/
  metolit:
    output: true
    permalink: /metolit/:name/
  piti:
    output: true
    permalink: /piti/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: default
